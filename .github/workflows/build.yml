name: Build Windows executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install lupa SimConnect pyinstaller
          pip install -e .

      - name: Build executable
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name FlightInstructor \
            --collect-data flight_instructor \
            --collect-all lupa \
            --collect-all SimConnect \
            --hidden-import tkinter.scrolledtext \
            --hidden-import tkinter.font \
            src/flight_instructor/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlightInstructor-windows
          path: dist/FlightInstructor.exe
          if-no-files-found: error

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          make_latest: true
          files: dist/FlightInstructor.exe
